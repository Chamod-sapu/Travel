spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: user-service-register
          uri: lb://user-service
          predicates:
            - Path=/api/users/register
            - Method=POST
        - id: user-service-login
          uri: lb://user-service
          predicates:
            - Path=/api/users/login
            - Method=POST
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter
        - id: flight-service
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**
          filters:
            - JwtAuthFilter
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotels/**
          filters:
            - JwtAuthFilter
        - id: package-service
          uri: lb://package-service
          predicates:
            - Path=/api/packages/**
          filters:
            - JwtAuthFilter
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthFilter

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8090

